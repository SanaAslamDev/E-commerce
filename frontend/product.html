<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Click Cart - Product Details</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=BJCree:wght@400;500;600;700&family=Cinzel:wght@400..900&family=Dancing+Script:wght@400..700&family=Kameron:wght@400..700&family=Manrope:wght@200..800&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Oswald:wght@200..700&family=Playwrite+ID:wght@100..400&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Tangerine:wght@400;700&display=swap" rel="stylesheet">
  <script>
   
  window.CLICK_CART_API_BASE = window.CLICK_CART_API_BASE || "https://e-commerce-production-cd13.up.railway.app";
  </script>
</head>
<body>


<nav class="shop-navbar">
  <a href="index.html" class="logo">Click Cart</a>
  <div class="search-bar" role="search">
    <svg class="search-icon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
      <circle cx="11" cy="11" r="8" /><path d="m21 21-4.35-4.35" />
    </svg>
    <label for="searchInput" class="sr-only">Search products</label>
    <input type="text" id="searchInput" placeholder="Search products..." aria-label="Search products" onkeydown="if(event.key==='Enter'){window.location.href='shop.html';}" />
  </div>
  <div class="shop-nav-actions">
    <button class="icon-btn" title="Wishlist" aria-label="View wishlist" onclick="openWishlistModal()">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24" aria-hidden="true"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg>
    </button>
    <div class="cart-icon" id="cartIconBtn" onclick="toggleCart()" tabindex="0" role="button" aria-label="Open cart" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();toggleCart();}">
      <svg width="21" height="21" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z" />
        <line x1="3" y1="6" x2="21" y2="6" /><path d="M16 10a4 4 0 0 1-8 0" />
      </svg>
      <span class="cart-badge" id="cartBadge">0</span>
    </div>
    <div class="user-menu" id="userMenuSection" style="display:none;">
      <button class="btn-solid" onclick="toggleDropdown()" id="userBtn" aria-haspopup="true" aria-expanded="false">User</button>
      <div class="dropdown" id="userDropdown">
        <a href="#" onclick="showOrders()">My Orders</a>
        <a href="#" onclick="handleLogout()">Logout</a>
        <a href="#" onclick="deleteProfile()" class="danger">Delete Profile</a>
      </div>
    </div>
    <div id="guestSection">
      <button class="btn-solid" onclick="window.location.href='index.html'">Login</button>
    </div>
  </div>
</nav>

<!-- BREADCRUMB -->
<nav class="breadcrumb" aria-label="Breadcrumb">
 <a href="index.html">Home</a> / <a href="shop.html">Shop</a> / <a href="shop.html" id="breadcrumbCategory"></a> / <span class="breadcrumb-current" id="breadcrumbName"></span>
</nav>

<!-- PRODUCT DETAILS -->
<div class="product-detail-container">
  <div class="product-detail-grid" id="productDetailGrid" style="display:none;">
    <div class="product-detail-media">
      <img class="product-detail-img" id="pdImage" src="" alt="" />
    </div>
    <div class="product-detail-info">
      <span class="product-category" id="pdCategory"></span>
      <h1 class="product-detail-name" id="pdName"></h1>
      <div class="price" id="pdPrice"></div>
      <p class="product-detail-desc" id="pdDescription"></p>
      <span class="stock-badge" id="pdStock"></span>
      <div class="product-detail-actions">
        <button class="btn-add-cart" id="pdAddToCartBtn">Add to Cart</button>
        <button class="btn-wishlist" id="pdWishlistBtn" aria-pressed="false">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/>
          </svg>
          <span id="pdWishlistLabel">Add to Wishlist</span>
        </button>
      </div>
    </div>
  </div>
  <p class="loading-text" id="productDetailLoading">Loading product...</p>
</div>

<!-- CART PANEL -->
<div class="cart-panel" id="cartPanel">
  <div class="cart-header">
    <h2>Your Cart</h2>
    <button class="close-btn close-btn--dark" onclick="toggleCart()" aria-label="Close cart">&#x2715;</button>
  </div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-footer">
    <div class="cart-summary-row"><span>Subtotal</span><span id="cartSubtotal">Rs 0.00</span></div>
    <div class="cart-summary-row"><span>Shipping</span><span>Rs 0.00</span></div>
    <div class="cart-total" id="cartTotal">Total: Rs 0.00</div>
    <button class="btn-checkout" onclick="openDeliveryModal()">Checkout Now</button>
    <button class="btn-view-cart" onclick="toggleCart()">View Cart</button>
  </div>
</div>
<div class="cart-scrim" id="cartScrim" onclick="toggleCart()"></div>

<!-- DELIVERY MODAL -->
<div class="modal-overlay" id="deliveryModal">
  <div class="delivery-modal">
    <button class="close-btn" onclick="closeModal('deliveryModal')" aria-label="Close">&#x2715;</button>
    <h2>Delivery Details</h2>
    <form id="deliveryForm" onsubmit="event.preventDefault(); placeOrder();">
      <label class="modal-label" for="fullName">Full Name</label>
      <input type="text" id="fullName" name="fullName" placeholder="Enter your name" autocomplete="name" required />
      <label class="modal-label" for="phoneNumber">Phone Number</label>
      <input type="tel" id="phoneNumber" name="phoneNumber" placeholder="03xx-xxxxxxxx" autocomplete="tel" inputmode="tel" required />
      <label class="modal-label" for="emailAddress">Email Address</label>
      <input type="email" id="emailAddress" name="emailAddress" placeholder="Email Address" autocomplete="email" required />
      <label class="modal-label" for="deliveryAddress">Street Address</label>
      <textarea id="deliveryAddress" name="deliveryAddress" placeholder="House no, street, area" required></textarea>
      <div class="delivery-row">
        <div class="delivery-col">
          <label class="modal-label" for="deliveryCity">City</label>
          <input type="text" id="deliveryCity" name="deliveryCity" placeholder="City" autocomplete="address-level2" required />
        </div>
        <div class="delivery-col">
          <label class="modal-label" for="deliveryPostal">Postal Code</label>
          <input type="text" id="deliveryPostal" name="deliveryPostal" placeholder="Postal code" autocomplete="postal-code" inputmode="numeric" required/>
        </div>
      </div>
      <div class="total-amount" id="modalTotal">Total Amount: Rs 0.00</div>
      <button type="submit" class="btn-submit" id="placeOrderBtn">Place Order</button>
    </form>
  </div>
</div>

<!-- RECEIPT MODAL -->
<div class="modal-overlay" id="receiptModal">
  <div class="receipt">
    <div class="receipt-check">
      <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" aria-hidden="true">
        <polyline points="20 6 9 17 4 12" />
      </svg>
    </div>
    <h2>Order Confirmed!</h2>
    <p class="receipt-sub">Thank you for shopping with Click Cart</p>
    <div class="receipt-details" id="receiptDetails"></div>
    <div class="receipt-total" id="receiptTotal"></div>
    <button class="btn-submit" onclick="closeModal('receiptModal')">Done</button>
  </div>
</div>

<!-- MY ORDERS MODAL -->
<div class="modal-overlay" id="ordersModal">
  <div class="orders-modal">
    <button class="close-btn" onclick="closeModal('ordersModal')" aria-label="Close">&#x2715;</button>
    <h2>My Orders</h2>
    <div id="ordersList"></div>
  </div>
</div>

<!-- WISHLIST MODAL -->
<div class="modal-overlay" id="wishlistModal">
  <div class="orders-modal">
    <button class="close-btn" onclick="closeModal('wishlistModal')" aria-label="Close">&#x2715;</button>
    <h2>My Wishlist</h2>
    <div id="wishlistList"></div>
  </div>
</div>

<script src="js/product.js"></script>

</body>
</html>
