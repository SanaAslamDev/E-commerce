<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Click Cart - Shop</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;0,900&display=swap" rel="stylesheet" />
</head>
<body>

<!-- NAVBAR -->
<nav class="shop-navbar">
  <a href="index.html" class="logo">Click Cart</a>
  <div class="search-bar">
    <svg class="search-icon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8" /><path d="m21 21-4.35-4.35" />
    </svg>
    <input type="text" id="searchInput" placeholder="Search products..." oninput="searchProducts()" />
  </div>
  <div class="shop-nav-actions">
    <button class="icon-btn" title="Wishlist" aria-label="Wishlist">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg>
    </button>
    <div class="cart-icon" onclick="toggleCart()">
      <svg width="21" height="21" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
        <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z" />
        <line x1="3" y1="6" x2="21" y2="6" /><path d="M16 10a4 4 0 0 1-8 0" />
      </svg>
      <span class="cart-badge" id="cartBadge">0</span>
    </div>
    <div class="user-menu" id="userMenuSection" style="display:none;">
      <button class="btn-solid" onclick="toggleDropdown()" id="userBtn">User</button>
      <div class="dropdown" id="userDropdown">
        <a href="#" onclick="showOrders()">My Orders</a>
        <a href="#" onclick="handleLogout()">Logout</a>
        <a href="#" onclick="deleteProfile()" class="danger">Delete Profile</a>
      </div>
    </div>
    <div id="guestSection">
      <button class="btn-solid" onclick="window.location.href='index.html'">Login</button>
    </div>
  </div>
</nav>

<!-- SHOP -->
<div class="shop-container">
  <div class="filter-bar">
    <button class="filter-btn active" onclick="filterCategory('')">All</button>
    <button class="filter-btn" onclick="filterCategory('Electronics')">Electronics</button>
    <button class="filter-btn" onclick="filterCategory('Accessories')">Accessories</button>
    <button class="filter-btn" onclick="filterCategory('Fashion')">Fashion</button>
    <button class="filter-btn" onclick="filterCategory('Cosmetics')">Cosmetics</button>
    <button class="filter-btn" onclick="filterCategory('Appliances')">Appliances</button>
  </div>
  <div class="products-grid" id="productsGrid">
    <p class="loading-text">Loading products...</p>
  </div>
</div>

<!-- CART PANEL -->
<div class="cart-panel" id="cartPanel">
  <div class="cart-header">
    <h2>Your Cart</h2>
    <button class="close-btn close-btn--dark" onclick="toggleCart()">&#x2715;</button>
  </div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-footer">
    <div class="cart-summary-row"><span>Subtotal</span><span id="cartSubtotal">Rs 0.00</span></div>
    <div class="cart-summary-row"><span>Shipping</span><span>Rs 0.00</span></div>
    <div class="cart-total" id="cartTotal">Total: Rs 0.00</div>
    <button class="btn-checkout" onclick="openDeliveryModal()">Checkout Now</button>
    <button class="btn-view-cart" onclick="toggleCart()">View Cart</button>
  </div>
</div>
<div class="cart-scrim" id="cartScrim" onclick="toggleCart()"></div>

<!-- DELIVERY MODAL -->
<div class="modal-overlay" id="deliveryModal">
  <div class="delivery-modal">
    <button class="close-btn" onclick="closeModal('deliveryModal')">&#x2715;</button>
    <h2>Delivery Details</h2>
    <label class="modal-label">Full Name</label>
    <input type="text" id="fullName" placeholder="Enter your name" />
    <label class="modal-label">Phone Number</label>
    <input type="text" id="phoneNumber" placeholder="03xx-xxxxxxxx" />
    <label class="modal-label">Email Address</label>
    <input type="email" id="emailAddress" placeholder="Email Address" />
    <label class="modal-label">Street Address</label>
    <textarea id="deliveryAddress" placeholder="House no, street, area"></textarea>
    <div class="delivery-row">
      <div class="delivery-col">
        <label class="modal-label">City</label>
        <input type="text" id="deliveryCity" placeholder="City" />
      </div>
      <div class="delivery-col">
        <label class="modal-label">Postal Code</label>
        <input type="text" id="deliveryPostal" placeholder="Postal code" />
      </div>
    </div>
    <div class="total-amount" id="modalTotal">Total Amount: Rs 0.00</div>
    <button class="btn-submit" onclick="placeOrder()">Place Order</button>
  </div>
</div>

<!-- RECEIPT MODAL -->
<div class="modal-overlay" id="receiptModal">
  <div class="receipt">
    <div class="receipt-check">
      <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <polyline points="20 6 9 17 4 12" />
      </svg>
    </div>
    <h2>Order Confirmed!</h2>
    <p class="receipt-sub">Thank you for shopping with Click Cart</p>
    <div class="receipt-details" id="receiptDetails"></div>
    <div class="receipt-total" id="receiptTotal"></div>
    <button class="btn-submit" onclick="closeModal('receiptModal')">Done</button>
  </div>
</div>

<!-- MY ORDERS MODAL -->
<div class="modal-overlay" id="ordersModal">
  <div class="orders-modal">
    <button class="close-btn" onclick="closeModal('ordersModal')">&#x2715;</button>
    <h2>My Orders</h2>
    <div id="ordersList"></div>
  </div>
</div>

<script src="js/shop.js"></script>

</body>
</html>
